body:
  text: 東觀奏記卷下唐裴庭裕撰大中九年正月十九日制曰朝議郎守尚書刑部郎中柱國賜緋魚袋唐技將仕郎守尚書職方員外郎裴庭裕先父早以科名荐由臺閣聲猷素履亦有可嘉昨者吏部以爾秉心精專請委考核而臨事或乖於公當物議遂至於沸騰豈可尚列綸扉是宜並分符竹善緩凋瘵以補悔尤技可虔州刺史散官勳封如故裴可申州刺史散官如故舍人杜德公之詞也吏部侍郎兼判尚書銓事裴諗左授國子祭酒吏部侍郎周敬復罰一月俸監察御史馮顓左授祕書省著作佐郎考院所送博學宏詞科趙樞等十人並宜覆落不在施行之限初裴諗兼上銓主試宏技兩科其年爭名者衆應宏詞選前進士苖台符楊巖薛欣李詢古敬翃已下一十五人就試諗寬豫仁厚有賦題不密之説前進士栁翰京兆尹栁惠之子也故事宏詞科只三人翰在選中不中選者言翰於諗處先得賦題託詞人溫庭筠為之翰既中選其聲聒不止事徹宸聼杜德公時為中書舍人言於執政曰某兩為考官本試宏詞先鎖考闕文書自先得賦題者必佳糊名考文書得佳者考官乃公當罪上銓為宜考官不合坐宏詞趙樞丞相令狐綯故人子也同列將以此事嫁患於令狐丞相丞相闕遂之盡覆去初日官闕星毫奏於闕星暗科場當有事沈詢為禮部侍郎聞而憂焉至是三科盡覆日官之言方驗上自黨項叛擾推其由乃邊將貪暴利其羊馬多欺取之始用右諫議大夫李福為夏州節度使刑部侍郎畢誠為邠寧節度使大理卿裴識為涇原節度使發日臨軒戒勵稟奉宸威絶侵奪之貪邊方帖息烽燧不復告警矣浙東觀察使兼御史中丞李訥為軍士噪逐坐貶朗州刺史馳驛赴任訥性褊狷遇軍士不以禮人皆怨之遂及於難監軍使王景宗責撫循無狀杖四十流恭陵自此戌臣失律監軍皆從坐宰臣鄭朗自中書歸宣平私第內園使李敬實衢路衝之朗列奏上召敬實靣語敬實奏供奉官例不避上曰衡天子之命橫絶而過可矣安有私出不避輔相乎剝紫綬配南衙劉臯為鹽州刺史甚有威名監軍使楊玄價誣奏臯謀叛函首以進闔朝公卿靣折庭爭上重違百辟之言始坐玄價専殺不辜之罪上晚嵗酷好仙道廣州監軍使吳德勵離闕日病腳已蹣跚矣三載監廣師歸闕足疾却平上詰之遂具為上説羅浮山人軒轅集醫整上聞之甘心焉驛詔軒轅集赴京師既至館于南亭院外廷莫之靣也諫官恐害政屢以為言上曰軒轅道人口不干世事卿勿以為憂留嵗餘放歸授朝奉大夫廣州司馬集堅不受臨與上别上問理天下當得幾年集曰五十年上聞之慰説及遏密之嵗春秋五十李景讓夏侯孜侃侃立朝俱勵風操景讓為御史大夫視事之日以侍御史孫玉汝監察御史盧涓王覿不稱職請移他官孜為右丞相以職方郎中裴諴虞部郎中韓瞻俱聲績不立詼諧取容諴改太子中允瞻改鳳州刺史于延陵授建州刺史中謝上問之曰建去京師近遠延陵曰八千里上曰朕左右前後皆建人也郡極不惡卿若為我廉潔奉公綏緝凋瘵長在我靣前無異或撓法度逺人無聊即朕三尺階前便是萬里卿知之否延陵悸懾失序上撫而遣之太常卿封敖於私第上事御史臺彈奏左遷國子祭酒故事太常卿上曰庭設九部樂盡一時之盛敖拜太常卿欲便於親閲遂就私第視事法司舉奏遂薄責焉上勵精理天下一紀之內欲臻升平自大中十二年後藩鎮繼有叛亂軍州都將康全泰逐出觀察使鄭勳湖南都將石再順逐出觀察使韓琮廉州部將王令寰逐出節度使楊發江西都將巴鶴逐出觀察使鄭憲上赫怒命淮南節度使檢校左僕射平章事崔鏡兼領宣池歙三州觀察使以宋州刺史溫漳為宣州刺史以右金吾將軍蔡襲為湖南觀察使以涇原節度使李承勛為廣州節度使以光祿卿韋宙為江西觀察使知取鄰道兵送赴任凶渠如期授首皆不勞師斬定誅鋤盡副聖旨李景讓為吏部尚書抗疏言穆宗至敬宗文宗武宗四廟當遷出以穆宗是上兄弟文宗以下是上猶子陛下拜兄尚可拜姪可乎使陛下得親事七廟宜重升代宗以下入廟以正三昭三穆之序事下百官集議不定而止時人以上方銜穆宗深謂景讓希旨多不直其事越人仇甫聚衆為亂攻陷剡縣諸暨等縣浙左騷然上用王式為浙東觀察使以武寧軍健卒二千人送式之任式生擒仇甫以獻斬於東市始選前進士于琮為壻連拜祕書省校書郎右拾遺賜緋左補闕賜紫尚永福公主事忽中寢丞相上審聖旨上曰朕此女子近因與之會食對朕輒折匕筯性情如此恐不可為士大夫妻許琮别尚廣德公主亦上次女也上委信宰輔言發即從就中於元輔恩禮稍異白敏中赴邠寧行營幸興福樓送之自樓上投下朱書御札一副與敏中言君臣注倚之分崔鉉赴鎮淮南幸通化樓送之并賜詩四韻以寵行邁鉉刻其詩於宣化驛僧從晦住安國寺道行高潔兼攻詩以文章應制上每擇劇韻令賦亦多稱旨晦積年供奉望紫方袍之賜以耀法門上兩召至殿上謂之曰朕不惜一對紫袈裟與師但師頭耳稍薄恐不勝耳竟不之賜晦悒悒而終憲宗鼎成之夜左軍中尉吐突承璀實遭其禍上即位追感承璀死於忠義連擢其子士儼至顯貴為右軍中尉開府儀同三司恩禮始終無替焉畢誠本賈客之子連升甲乙科杜琮為淮南節度使置幕中始落鹽籍文學優贍遇事無滯在翰林上恩顧特異許用為相深為丞相令狐綯所忌自邠寧連移鳳翔昭義北門三鎮皆綯緩其入相之謀也諴思有以結綯在北門求得絶色非人世所易有盛飾珠翠専使獻綯綯一見之心動謂其子曰尤物必害人畢大厚於吾無分今以是餌吾將傾吾家族也一見返之専人不敢將回驛候諴意諴又瀝血輸啓事于綯綯終不納乃命專吏貨之東頭醫官李玄伯上所狎昵者以錢七十萬致於家乃舍之正堂玄伯夫妻執賤役以事焉踰月盡得其歡心矣乃進於上上一見惑之寵冠六宫玄伯燒伏火丹砂進之以市恩澤致上瘡疾皆玄伯之罪也懿宗即位玄伯與山人王嶽道士盧紫芝俱棄市大中十二年始用左諫議大夫鄭湋兵馬郎中李鄴為鄆王已下侍讀時郢王居十六宅夔昭已下五王居大明宫內院數日追制改充夔王已下侍讀五日一入乾符門講讀鄆王即位後其事遂停武寧軍節度使康季榮不恤軍士部下噪而逐之投於嶺外上以左金吾大將軍田年曾任徐州有政聲特開延英殿召對再命建節往鎮一方於是安帖韋澳在翰林極承恩遇自京兆尹出為河陽三城節度使當軸者擠之也大中十三年三月魏博節度使何𢎞敬就加中書令上命宣徽南院使王居方往魏博賜麻制假道河陽上以縛紙手詔澳曰密飾裝秋當與卿相見戒居方曰過河陽以此賜澳無令人知居方既至密以宸翰授澳上七月寢疾八月晏駕遂中寢命監察御史楊戴往浙西道勘覆軍額大中十二年宣州叛將康全泰噪逐觀察使鄭薰劉廷用宋州刺史溫璋問罪時蕭置為浙西觀察使地與宣州接連遂擢用武臣李瑑代置特建鎮海軍節鎮撫之以張犄角之勢兵罷後謗者言瑑虛署官健名廣占衣糧沒入私家上遂命戴往按復軍籍無一卒虛額者戴還條奏謗者之言始不勝度支奏狀言漬汚假匹誤書清汚上一覽異之樞密使承旨孫隱中謂上未省也添成漬字及中書復入上赫怒勘添改表奏者罰責有差大中十一年正月一日上御含元殿受朝太子太師盧鈞年八十矣自樂懸之南步而及殿墀稱賀上前聲容朗緩舉朝服之至十二年元日含元受賀太子少師栁公權年亦八十矣時為百官首含元殿廷敻逺自樂懸南步至殿下力已綿憊稱賀之後上尊號聖敬文思闕孝皇帝公權誤曰光武和孝御史彈出之罰一季俸料七十致事舊典也公權不能克遵典禮老而受辱人多惜之太常卿髙銖決罰禮院禮生博士李慤引故事見執政以禮院雖係太常寺從博士自専事無關白者所以太常三卿初蒞事博士無參集之禮今銖重罰禮生有違典故丞相以銖夙德唯唯而已銖曰吾老不能退一旦為後生所辱遂乞罷敕鄉貢進士溫庭筠早隨計吏夙著雄名徒負不羈之才罕有適時之用放騷人於湘浦移賈誼於長沙尚有前席之期未爽抽毫之思可隋州隋縣尉舍人裴坦之詞也廷筠字飛卿彥博之裔孫也詞賦詩篇冠絶一時與李啇隱齊名時號溫李連舉進士竟不中第至是謫為九品吏進士紀唐天歎廷筠之寃贈之詩曰鳳凰詔下雖求命鸚鵡才高却纍身人多諷誦上明主也而廷筠反以才廢制中自引騷人長沙之事君子譏之前一年啇隱以鹽鐡推官死啇隱字義山詩學宏博箋表尤著於人間自開成二年升進士第至上十二年竟不升於三庭而廷筠亦恓恓不涉第闕者以文學為極致已霸於此遂於祿位有所愛耶不可得而問矣山南西道觀察使奏渠州犀牛見差官押赴闕廷既至上於便殿閲之置月華門外宣示百寮上慮傷物性命中使押選本道復於渠州之野上命左軍中尉王宗實治道將幸華清宫兩省供奉官拜疏極諫上謂宰臣曰華清宫是祖宗舊宫又朝元閣聖祖現真容地朕一紀在位未嘗瞻拜深覺缺儀今排比皆是軍司不勞州縣卿宜勉諭諫官勿更論列宰臣奉旨而退召兩省官宣諭俄而諫表再入上謂宰臣曰諫官疏極懇切且言自穆宗巡幸之後列聖未嘗出宫居安慮危乞留聖慮朕聞此語決為遊華清之行矣宜召兩省官説我此意十二年七月十四日三更三點追朝難宰臣夏侯孜獨到衙以御史大夫李景讓為檢校吏部尚書充劍南西川節度使時仲元休假通事舍人無在館者麻案既出孜受麻畢乃召當直中書舍人馮圖宣之捧麻皆兩省胥吏自此始令通事舍人休浣亦在館俟命上自不豫宰輔侍臣無對見者瘡甚令中使往東都太僕卿裴詡宣索藥中使往返五日復命召醫瘡方士院生對於寢殿院言可療既出不復召矣大漸顧命內樞密使王歸長馬公儒宣徽上院使王居方以夔王當璧為託三內臣皆上素所恩者泣而受命時右軍中尉王茂玄心亦感上左軍中尉王宗貴素不同歸長公儒居方患之乃矯詔出宗實為淮南監軍使宣化門受命將由右銀臺出焉左軍副使丌元實謂宗實曰聖人不豫踰月中尉止隔門起居今日除改未可辨也請一靣聖人而出宗實始悟復入即詣門已踵故事添人守捉矣丌元實翼導宗實直至寢殿上已晏駕東頭環立宗實叱居方下責以矯宣皆捧足乞命遣宣徽北院使齊元簡迎鄆王于藩邸即位是為懿宗歸長公儒居方皆誅死籍沒其家朝美人薨上震悼久之美人在上藩邸時承恩遇實生鄆王萬夀公主焉薨後詔翰林學士蕭置為志文皆刻其事及夔昭已下五王居內院而鄆王獨還藩邸大中未位之先人間竊有擬議者置以此事言於公卿方辨立長之順鄆王嗣位後美人追崇為皇太后太常杜宣猷獻諡曰元昭配享宣宗廟室東觀奏記卷下
