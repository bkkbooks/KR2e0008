body:
  text: 東觀奏記雜史類提要臣等謹案東觀奏記三卷唐右補闕裴庭裕撰庭裕字膺餘聞喜人出東眷房後見新書宰相世系表其書専記宣宗一朝之事前有自序稱上自壽邸即位二年監修國史丞相晉國公杜讓能奏選碩學之士十五人分修三聖實録以吏部侍郎桞玭右補闕裴庭裕左拾遺孫泰駕部員外郎李允太常博士鄭光庭専修宣宗實録自宣宗至今垂四十載中原大亂日厯起居注不存一字謹采耳目聞覩撰成三卷奏記于晉公藏之于閣以備討論蓋其在史局時所上監修稿本也序末不署成書年月考杜讓能以龍紀元年三月兼門下侍郎十二月為司徒景福元年守太尉元年貶死昭宗之二年即大順元年此序云奏記於監國史晉國公則當在大順景福之間其云自宣宗至是垂四十年蓋由大中以來約紀之詞若以宣宗末年計至光化初年始為四十載則讓能之死已久無從奏記矣書中紀事頗具首尾司馬光作通鑑多採其說而亦不盡信之蓋以當代之人紀所目擊之事容不無愛憎之詞然其叙次詳贍有禆於史闕者亦不少也乾隆四十二年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀東觀奏記原序聖文睿德光武𢎞孝皇帝自夀邸即位二年監修國史丞相晉國公杜讓能以宣宗懿宗三朝實録未修嵗月漸遠慮聖績湮墜乃奏上選中朝鴻儒碩學之士十五人分修三聖實録以吏部侍郎柳玭右補闕裴庭裕左拾遺孫泰駕部員外郎李𦙍太常博士鄭光庭專修宣宗實録庭裕奉詔之日惕不敢易思托實無𨼆以成一朝之書踰嵗修例竟未立國朝故事以左右史修起居注逐季送史館史館别設修撰官起居注外又置日厯至修實録之日取信於日厯起居注參而成之伏自宣宗皇帝宫車晏駕垂四十載中原大亂日厯與起居注不存一字致儒學之士閣筆未就非曠職官無憑起凡例也庭裕自為兒時已多記憶謹采宣宗朝耳目聞覩撰成三卷非編年之史未敢聞於縣官且奏記於監國史晉國公藏之於閣以備討論
