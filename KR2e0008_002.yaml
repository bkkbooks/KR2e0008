body:
  text: 東觀奏記卷中唐裴庭裕撰上每命相盡出睿㫖人無知者一日制詔樞宻院兵部侍郎判度支蕭鄴可同中書門下平章事仰指揮學士院降麻處分樞宻使王歸長馬公儒以鄴先判度支再審聖㫖未審落下爲復仍舊上意貴迎祐蕭也乃宸翰付學士院戸部侍郎判户部事崔慎由可工部尚書平章事落下判户部事宸斷如此河東節度使劉瑑在内署日上深器異大中十一年上手詔追之令乘逓赴闕初無知者瑑奏發太原人方信之既至拜户部侍郎判度攴十二月十七日次對上以御按歴日付瑑令於下旬擇一吉日瑑不諭㫖上曰但擇一拜官日即得瑑跪奏二十五日甚佳上笑曰此日命卿爲相祕無知者高湜自集賢校理爲蔣係鳳從事湜即瑑舊寮也二十四日辭瑑於宣平里私第湜曰竊度旬日必副具瞻之望瑑笑曰來日具瞻何旬日也湜驚不敢發詰旦果爰立矣始以此事洩於湜既入相深有昇平之望與慎由議政於上前慎由曰唯當甄别品流上酬萬一瑑曰王夷甫當衰晉之末崇尚浮虛祖述流品終致中原版蕩晉室淪夷今當盛明之朝不能循名責實使百吏各稱其職而上酬陛下臣未知致理之日慎由不能對因此恩澤浸衰罷爲東川節度魏國公崔鉉秉政鄭魯楊紹復叚瓌薛䝉一時俊造鉉所取信凢有補吏議事或與之㕘酌時人語曰炙手可熱楊鄭叚薛欲得命通魯紹瓌䝉時魯爲刑部侍郎鉉欲引以爲相聖㫖授河南尹不測其事赴後上問曰鄭魯發後除改卿還自由否鉉驚恐宻以此事訪於左右云御扆上題此四句鉉益畏上聼政之暇多賦詩多令翰林學士屬和一日賦詩賜寓直學士蕭寘曹確令繼和寘手狀謝曰陛下此詩雖桂水日千里因之平生懐亦無以加也明日召學士韋澳問此兩句澳奏曰宋太子家令沈約詩寘以睿藻清新取方沈約爾上不悅曰將人臣比我得否恩遇漸薄執政乗之闕出爲浙西觀察使崔罕爲京兆尹内園廵官不避馬杖之五十四方死上赫怒令與遠郡宰臣論救上曰罕爲京兆尹抑强撫弱是其職任但不避馬便杖之可矣不合問知是内園廵官方決一錯也又人臣之刑止行二十過此是朕刑也五十四杖頗駭聞聼宰臣又論救上曰與一廉察奮挺者宜抵罪根本輕致罕過制耳宰臣益賀上無幽不察罕止貶湖南觀察使故事京兆尹在私第但竒日入府偶日入逓院崔郢爲京兆尹囚徒逸獄而走上始命造京尹𪠘宅京兆尹不得離府上以崔罕郢併敗官靣召翰林學士韋澳授京兆尹便令赴上賜度支錢二萬貫令造府宅澳公正方嚴吏不敢欺委長安縣尉李信主其事造成𪠘字極一時壯麗尚有羡緡却進澳連書信兩上下考焉韋澳爲京兆尹豪右歛手國舅鄭光莊不納租澳繫其主者期以五日不足必抵法太后爲言之上延英問澳澳具奏本末上曰今日納租足放否曰尚在限内來日即不得矣澳既出半廷上連召之曰國舅莊租今日納足放主者否澳曰必放上入告太后曰韋澳不可犯且與送錢納却頃刻而租足先是京兆府進士明經觧送設殊次平等三級以甄别行實近年公道益衰止於奔競至觧送之日威勢撓敗如市道焉至是澳牓曰朝廷將禆教化廣設科塲當開元天寳之間始專重明經進士及貞元元和之際又益以薦送相高當時務尚切磋不分黨甲絶僥倖請託之路有推賢讓能之風等列標名僅同科第既爲盛事固可公行近日已來前規頓改互爭强弱多務奔馳定高卑於下第之初決可否於差官之日曾非考覈盡繫經營奧學雄文例拾於真方寒素增年矯白盡取於黨比羣强中選者曽不足云而争名者益熾其事澳叨司畿甸合貢英髦非無藻鑒之心懼有愛憎之謗且李膺以不察孝廉去任胡廣以輕舉茂才免官况其管窺實難裁處况禮部格文本無等第府廷觧送不合區分今年合送省進士明經等並以納策試前後爲定不在更分等第之限詞科之盛本以京兆府等第爲梯級建中二年崔元翰崔敖崔備三人府元府副府第三人于邵知貢舉敖及第並依府列盖推崇藝實不能易也自文學道䘮朋黨道興紛競既多澳不勝憤遂此釐革盖救一時之弊人多惜之上至孝動遵元和故事以憲宗曾幸青龍寺命複道開便門至青龍佛宫涕泣禮拜追感元和聖跡悵望久之上敦睦九族於諸侯王尤盡友愛即位後於十六宅起雍和殿每月三兩幸與諸侯王擊鞠合樂錫賚有差進士司馬樞爲雍和殿賦詞雖不典亦志一時之事實牛藂任拾遺補闕五年頻上封章上盡記之後藂自司勲員外爲睦州刺史中謝上命至軒砌問曰卿頃任諫官頗能舉職今忽爲遠郡得非宰臣以前事爲懲否藂曰陛下新有徳音未任刺史縣令不得任近侍官宰臣以是奬擢非嫌忌也上曰賜卿紫藂退謝畢前曰臣所衣緋衣是刺史借服不審陛下便賜紫爲復别有進上連曰且賜緋且賜緋上慎重名器未嘗容易服色之賜一無所濫李藩自司勲郎中遷駕部郎中知制誥衣緑如故鄭裔綽自給事中以論駁楊漢公忤㫖出商州刺史始賜緋衣銀魚沈詢自禮部侍郎爲浙東觀察使方賜金綬苖恪自司勲員外除洛陽令藍衫赴任裴處權自司封郎中出河南少尹到任本府奏薦賜緋給事中崔罕駁還上手詔褒奬曰有事不當卿能駁還職業既修朕何所患上每孜孜求理焦勞不倦一日宻召學士韋澳盡屏左右謂澳曰朕每便殿與節度觀察使刺史語要知所委州郡風俗物産卿宜宻採訪撰次一文書進來雖家臣與老不得漏洩奉宣㫖即以十道四蕃志更博採訪撰成一策題曰處分語自寫靣進雖子弟不得聞也後數日薛宏宗除鄧州刺史澳有别業在南陽召𢎞宗餞之𢎞宗曰昨日中謝聖上處分當州事驚人澳訪之即處分語中事也君上親摠萬幾自古未有上校獵城西漸及渭水見父老一二十人於村佛祠設齋上問之父老曰臣醴泉縣百姓本縣令李君奭有異政考秩已滿百姓惜留詣府乞未替兼此祈佛力也上黙然還宫後於御扆上大書君奭名中書兩擬醴泉令上皆硃去之踰嵗宰執以懷州刺史闕請用人御筆曰醴泉縣令李君奭可懐州刺史莫測也君奭中謝宸㫖奬勵始聞其可大理寺丞王景初與刑部郎中唐技議讞不平景初坐貶潭州司戸叅軍制下景初撾登聞鼓稱寃再貶昭州司户制曰不遵嚴譴輙冒登聞以懲不恭也京兆府叅軍盧諶昇進士第入官甚孤貧有文學京兆尹遣廵舘驛左補闕崔瑄婚姻廻與諶長亭相遇争㕔諶以官雖卑乃公行略不讓瑄瑄憤其不遜遂相詆訶諶來下御史臺按問吏云當服白衫諶曰非國恤不素服上聞之以諶言渉大不敬除籍爲民投之嶺表行至洛陽驛賜死瑄左遷河南府陽翟縣令大理卿馬曙任代北水陸運使代北出犀甲曙罷職以一二十領自隨故事人臣家不得蓄兵器曙既在朝乃瘞而藏之一日奴有犯罪者曙笞之即告于御史臺稱曙蓄兵器有異謀命吏發曙私第得甲不虛坐貶邵州刺史諫官上論以奴訴即主在法不治上命杖殺曙奴於青泥驛曙再貶嶺外上奏人臣無不感悅司農卿韋塵夜令術士爲厭勝之術御史臺劾奏貶永州司馬優人祝漢貞詞辨敏給恩傾一時嗣朝王乾祐以金帛結之求刺史盡納賂矣而未敢言御史臺劾奏漢貞杖二十流天徳軍乾祐竄嶺外上雅重詞學之臣於翰林學士恩禮特具宴遊宻召無所間隔惟於遷轉皆守彛章皇甫珪自吏部貟外召入内廷改司勲員外計吏員二十五箇月限轉司封郎中知制誥孔温裕自禮部員外改司封員外入内廷二十五箇月改司勲郎中知制誥動循官制不以爵禄私近臣也廣州節度使紇于臯以貪猥聞貶慶王府長史分司東都制曰鍾陵問俗澄清之化靡聞南海撫封貪黷之聲何甚而又交通詭遇溝壑無厭跡固異於澹臺道殊乖於吳𨼆舍人韓琮之詞也盡上一朝不進用矣工部尚書楊漢公前任荆南節度使以不廉聞公議益喧左遷祕書監制曰考三載之績爾最無聞致多士之朝人言未息既起風波之論難安喉舌之司舍人沈詢詞也至大中十三年漢公除同州刺史給事中鄭公輿裔綽三駁還制書上自即位但聞諫官論執左曹駁正無不立從其奏至是惑於左右三下漢公同州之命不允所論時屬寒食内宴百寮上因擊毬通班慰勞至給事中班謂公輿裔綽曰卿凢有駁議朕無不允從唯論漢公事渉朋黨裔綽前曰同州是太宗皇帝興王之地陛下爲子孫尤湏慎擇牧守漢公在荆南日貪殘已經朝責陛下豈可以祖宗種地私於此人上色變而迴馬翌日裔綽貶啇州刺史武昌軍節度副使苗名與庭裕家諱同責同子嚴不避馬擒至幕笞其背嚴母詣闕稱寃苖貶江州司馬制曰避馬雖乖於嚴敬鞭人合顧於簮纓舍人楊紹復之詞也苖自此爲清議所薄高品吳居中承恩澤甚厚賂術者欲固其寵術者令書上尊號於襪有告者上召至視之信然居中棄市藍田尉直𢎞文舘柳珪擢爲右拾遺𢎞文舘直學士給事中蕭倣鄭裔綽駁還曰陛下髙懸爵位本待賢良既命澆浮恐非懲勸珪居家不禀於義方奉國豈盡於忠節刑部尚書柳仲郢詣東上閤門進表稱子珪才器庸劣不合塵玷諫垣若誣以不孝即寃屈爲甚太子少師柳公權又訟侵毁之枉上令免珪官且在家修省貞元元和以來士林家禮法嚴整以韓臯柳公綽柳仲郢爲稱首一旦子稱不孝簮紳歎之太尉衛國公李徳裕上即位後坐貶崖州司户叅軍終于貶所一日丞相令狐綯夢徳裕曰某已謝明時幸相公哀之許歸葬故里綯具爲其子滈言滈曰李衛公犯衆怒又崔魏二丞相崔鉉魏謩皆敵人也見持政必將上前異同未可言之也後數日上將坐延英綯又夢徳裕某委骨海上思還故里與相公有舊幸憫而許之既寤召其子滈曰向來見李衛公精爽尚可畏吾不言必掇禍明日入中書具爲同列言之既於上前論奏許其子䝉州立山縣尉名與今上御名同護䘮歸葬翰林學士駕部郎中知制誥庾道蔚勅曰以藝文擢居近宻乖檢慎難處禁林宜守本官續連州刺史鄭朗爲御史大夫道蔚以事干之乞庇罪人者朗銜之朗既大用積前事盡聞于上故及此罪監修國史門下侍郎兼禮部尚書平章事鄭明奏當館修撰直史共四員准故事已通籍者為脩撰未昇朝者爲直舘伏以脩史重事合選廷臣秩序或卑筆削不稱其直舘伏請停廢更添置修撰兩員勅㫖宜依直舘萬年縣尉張範涇陽縣尉李節勤守本官以戸部郎中孟穆駕部員外郎李澳並充史舘修撰通籍爲四員分修四季之事以左拾遺鄭言爲太常博士鄭朗自御史大夫命相朗先爲浙西觀察使言實居幕中朗建議以諫官論時政得失動關宰輔鄭言必括囊形迹請移為博士至大中十一年崔慎由自户部侍郎秉政復以左拾遺杜蔚為太常博士蔚亦慎由舊僚也踵爲故事至理之代動循至公後闕代方之難矣以楚州刺史裴坦爲知制誥坦罷刺史赴闕宰臣令狐綯擢用宰臣裴休以坦非才不稱是選建議拒之力不勝坦命既行政事堂謁謝丞相故事謝畢便於本院上事四輔送之施一榻壓角而坐坦廵謁執政至休聼多輸感謝休曰此乃首台繆選非休力也立命肩舁便出不與之坐兩閤老吏云自有中書未有此事也人多爲坦羞之至坦知貢舉擢休之子𢎞上第時人云欲盖而彰此之謂也東觀奏記卷中
