body:
  text: 東觀奏記卷上唐裴庭裕撰孝明鄭太后閏州人也本姓爾朱氏李錡據浙西反相者言於錡曰朱氏有竒相當生天子錡取致於家錡誅死后入掖庭為郭太后侍兒憲宗皇帝愛而幸之生宣宗皇帝為母天下十四年懿宗即位尊為太皇太后又七年崩以郭太后配享出祭别廟上性至孝奉鄭太后供養不居别宫只於大明宫朝夕侍奉親舅鄭光即位之初連任平盧河中兩鎮節度使大中七年自河中來朝上因與光商較政理光素不曉文字對上語時有質俚即命宰臣别選河中節度使留光奉朝謁后或以光生計為憂即厚賜金帛不復更委方靣憲宗皇帝晏駕之夕上雖幼頗記其事追恨光陵商臣之酷即位後誅鋤惡黨無漏網者時郭太后無恙以上英察孝果且懷慚懼時居興慶宫一日與二侍兒同升勤政樓倚衡而望便欲殞於樓下欲成上過左右急持之即聞於上上大怒其夕后暴崩上志也懿安郭太后既崩喪服許如故事禮院檢討官王皥抗疏請后合葬景陵配享憲宗廟室疏既入上大怒宰臣白敏中召皥詰其事皥曰郭太后是憲宗春宫時元妃汾陽王孫逮事順宗為新婦憲宗厭代之夜事出暗昧母天下五朝不可以暗昧之事黜合配之禮敏中怒甚皥聲益厲宰臣將會食周墀駐敏中廳門以俟同食敏中傳語墀正為一書生惱亂但乞先之墀就敏中廳問其事皥益不撓墀以手加額於皥賞其孤直翌日皥貶潤州句容令墀亦免相大中十三年秋八月上崩宰臣令狐綯為山陵禮儀使奏皥為判官又皥拜章論懿安合配享憲宗始升祔焉上延英聼政問宰臣白敏中曰憲宗遷座景陵龍輴行次忽值風雨六宫百官盡避去惟有一山陵使胡而長攀靈駕不動其人姓氏為誰為我言之敏中奏景陵山陵使令狐楚上曰有兒否敏中奏長子緒見任隨州刺史上曰可任宰相否敏中曰緒小患風痺不任大用次子綯見任湖州刺史有台輔之器上曰追來翌日授考功郎中知制誥到闕召充翰林學士間歲遂立為相時人感歎敏中亮直無隱不掩人於上上因讀元和實録見故江西觀察使韋丹政事卓異問宰臣孰為丹後宰臣周墀奏臣近任江西觀察使見丹行事餘風遺愛至今在人其子宙見任河陽觀察判官上曰速與好官持憲者聞之奏為侍御史加贈故楚州刺史尚書工部侍郎李德修禮部尚書德修憲宗朝宰相李吉甫長子也吉甫薨太常諡曰簡度支郎中張仲方以德宗好用兵吉甫居輔弼之任不得謂之簡仲方貶開州司馬寶厯中仲方徵諫議大夫德修不欲同立朝連牧舒湖楚三州時吉甫少子德裕任荆南節度使檢校司徒平章事上即位普恩德裕當追贈祖父乞回贈其兄故有是命白敏中守司空兼門下侍郎充邠寧行營都統討山南平夏黨項發日以禁軍三百人從敏中上論請依裴度討淮西故事開幕擇廷臣不阻大吏上允之乃以左諫議大夫孫商為右庶子行軍司馬駕部郎中知制誥蔣名庭裕與私諱同為右庶子節度副使駕部員外李荀為節度判官戶部員外李法為都統掌記將軍冉昈暕羣從為都虞候上親妹安平公主下嫁駙馬都尉劉異上命宰臣與一方靣中書擬平盧節度使上謂曰朕只有一妹時欲闕青去京敻遠卿别思之宰臣乃奏邠寧節制闕平盧仍許安平公主歲時乘傳入京闕劉異將赴鎮安平入辭以異姬人從安平左右皆宫人上盡記之忽見别姬問安平曰此誰也安平曰劉郎音聲人俗呼如此上悅安平不妬喜形於色顧左右曰便與作主人不令與宫娃同處上之甄别防間纎微不遺如此萬夀公主上愛女鍾愛獨異將下嫁命擇郎壻鄭皓相門子首科及第聲名藉甚時昏盧氏宰臣白敏中奏選尚皓銜之上未嘗言大中五年敏中免相為邠寧都統行有日奏上曰頃者陛下愛女下嫁擇臣郎壻鄭皓赴婚楚闕會有日行次鄭州臣堂帖追回上副聖念皓不樂國姻銜臣入骨臣且在中書皓無如臣何一去玉階必媒孽臣短死無種矣上曰朕知此事久卿何言之晚耶因命左右便殿中取一柳木小函子來扄鎖甚固謂敏中曰此盡鄭郎説卿文字便以賜卿若聼皓言不任卿如此矣敏中歸啓益感上聰察宏恕常置函子於佛前焚香感謝大中十二年敏中任荆南節度使暇日與前進士陳鍇銷憂閣靜話感上恩泣話此事盡以示鍇杜悰通貴日久門下有術士李失名悰待之厚悰任西川節度使馬植罷黔中赴闕至西川術士一見謂悰曰受相公恩久思有效答今有所報矣黔中馬中丞非常人也相公當厚遇之悰未之信術士一日密於悰曰相公將有禍非馬中丞不能救悰始驚信發日厚幣贈之仍令吏為植於都下買宅死生之計無缺焉植至闕方知感悰不知其旨尋除光祿卿報狀至蜀悰謂術士曰貴人至闕作光祿卿矣術士曰姑待之稍進大理卿又遷刑部侍郎充諸道鹽鐵使悰始驚憂俄而作相懿安皇太后崩後悰懿安子壻也忽一日內榜子檢責宰相元載故事植諭旨翌日延英上前萬端營救植素辨博能回上意事遂中寢武宗朝任宰臣李德裕雖丞相子文學過人性孤峭疾朋黨如仇讎擠牛僧孺李宗閔崔洪於嶺南楊嗣復貞穆李公珏庭裕親外叔祖以會昌初册立事亦七年嶺外上即位之後嶺表五相同日遷北以吏部尚書李珏為檢校尚書右僕射充淮南節度使珏字待價趙郡贊皇人早孤居淮隂事母以孝聞弱冠從師舉明經李絳為華州刺史一見謂人曰日角珠廷非常人也當掇進士科明經碌碌非子發迹之路一舉不第應進士許孟容為宗伯擢居上第釋褐署烏重胤三城推官調進書判髙等授渭南縣尉遷右拾遺左遷下邽令丁母憂廬居三年不入室免喪諸侯羔鴈四府齊至門皆不就牛僧孺為武昌節度使奏章先逹銀臺授殿中侍御史內供奉武昌掌書記徵歸御史府韋處厚秉政一見笑曰清廟器豈擊搏才乎擢拜禮部員外改吏部員外李宗閔為相以品流程式為已任擢掌書命改司勳員外庫部郎中文宗召充翰林學士珏風格端肅屬辭敏贍恩傾一時纍遷戶部侍郎承旨許立相者屢矣鄭注以藥術為侍講學士李訓自流人召入內廷珏未嘗私焉訓注交譛貶江州刺史未幾訓為相造假甘露謀上左右與王涯等十一人赤族伏誅人方伏珏守正之祐徵為戶部侍郎與楊嗣復同日命上雖求理心切終優遊不斷同秉政者陳夷行鄭覃請經術孤單者進用珏與嗣復論地胄詞彩者居先每延英議政率相矛楯竟無成政但寄頰舌而已文宗將晏駕以猶子陳王成美當璧為記建桓立順事由兩軍潁王即位貶昭州刺史上即位纍遷河陽三城節度使吏部尚書至是崔鄲薨於淮南輟之撫理凡三載薨諡貞穆上臨御天下得君人法每宰臣延英奏事喚上階後左右前後無一人立才處分坐宸威不可仰視奏事下三四刻龍顔忽怡然謂宰臣曰可以間話矣自是詢閭里間事話宫中燕樂無所不至矣一刻已來宸威復整肅是將入宫也必有戒勵之言每謂宰臣長憂卿負朕撓法後度不得相見度量如此趙國公令狐綯每謂人曰十年持政柄每延英奏對雖嚴冬甚寒而汗流洽背李廓為武寧節度使不理右補缺鄭魯上疏曰臣恐新麥未登徐師必亂乞速命良將救此一方上未之省也麥熟而徐師亂上感魯言即擢為起居舍人吏部侍郎孔溫業白執政求外任丞相白敏中曰我輩亦須自點檢孔吏部不肯居朝矣至理之世丞相畏人也如此上微行至德觀女道士有盛服濃粧者赫怒急歸宫立宣左街功德使宋叔康令盡逐去别選男道士七人住持以清其觀上將命令狐綯為相夜半幸含春亭召對盡蠟燭一炬方許歸學士院乃賜金蓮花燭一作炬送之院吏忽見驚報院中曰駕來俄而趙公至吏謂趙公曰金蓮花乃引駕燭學士用之莫折事否頃刻而聞傅説之命侍御史馮緘與三院退朝入臺路遇集賢校理楊收不為之却緘為朝長臺中故事三院退朝入臺一人謂之朝長拉收僕臺中笞之集賢大學士馬植奏論玄宗開元中幸麗正殿賜酒大學士張説學士副知院事徐堅已下十八人不知先舉酒者説言學士以德行相先非具員吏遂十八爵齊舉今馮緘笞收僕者是笞植僕𨽻一般乞黜之御史中丞令狐綯又引故事論收之罪上兩釋之始著令三館學士不避行臺李丕以邊城從事奏事上召至案前問系緒丕奏系屬皇枝上曰師臣已有一李丕朕不欲九廟子孫與之同名良久以手畫案曰丕字出平平字也卿宜改名平舞蹈而謝平後終於邠寧節度使武宗好長生久視之術大明宫築望仙臺勢侵天漢上始即位道士趙歸真杖殺之罷望仙臺院大中八年復命緝之右補闕陳嘏已下抗疏論其事立罷修造以其院為文思院上英睿好理尤長於納諫從之如轉丸李璲除嶺南節度使間一日已命中使頒旄節給事中蕭倣封上詔書上正聼樂不暇别召中使謂優人曰汝可就李璲宅却喚使來旄節及璲門而反劉潼自鄭州刺史除桂州觀察使右諫議大夫鄭裔綽疏言不可中使至鄭頒告已數日却命追制納諫從善皆此類也馬植為相與左軍中尉馬元贄有亢宗之分上初即位元贄恩澤傾內臣曾賜寶帶內庫第一者元贄輟以遺植一日便殿對上覩植帶認是賜元贄者詰之植色變不敢隱翌日罷為天平軍節度使行次華州取植密吏董侔下御史獄盡聞植交通之狀再貶常州刺史汪濛授左拾遺庭裕先父任左補缺以濛家行不至薄妻孥為衆所聞不可處諫臣之列丞相魏謨盛怒須濛上事先君見魏於政事堂曰必要任濛乞先移他官丞相重違即改授濛太常博士上追感元和舊事但聞是憲宗朝卿相子孫必加擢用杜勝任刑部員外閣內次對上詢其祖父勝以先父黃裳永貞之際首排姦邪請憲宗監國上德之靣授給事中裴諗為學士一日加承旨上幸翰林諗寓直便中謝上曰加官之喜不與妻子相靣得否便放卿歸諗踏謝却召上以御盤果實賜之諗即以衫袖張而跪受上顧一宫嬪領下闕諗父度元和中君臣魚水之分遂於諗恩禮亦異焉上雅尚文學聼政之暇常賦詩尤重科名大中十年鄭皓知舉後宣宗索科名記皓表曰自武德已後便有進士諸科出鶯谷而飛鳴聲華雖茂經鳳池而閲視史策不書所傳前代姓名皆是私家記録虔承聖旨敢不討論臣尋委當行祠部員外趙璘採訪諸家科目記撰成十三卷自武德元年至朝謹專上進士方俟無疆勑宜付翰林自今放榜後並寫及第人姓名及所試詩賦題目進入內仍仰所司逐年編次術士柴嶽明洞隂陽術數於公卿間聲名藉甚上一日召於便殿對上曰朕欲為諸子孫闕院卿宜相其地嶽明奏曰人臣遷移不常有陽宅隂宅入隂宅入陽宅者禍福刑尅師有傳授今陛下居深宫有萬靈護衛隂陽二宅不言帝王家臣不敢奉詔上然之賜束帛遣歸司封員外郎充史館修撰權審於衢路突尚書左僕射平章事崔鉉判曰宰相之統庶寮僕射之臨郎吏豈有導騎已過按轡橫衝權審久在班行合諳典故便知素履且舉舊條送都省罰七直審以素履之言難於就列尋左遷宿州刺史自爾不復立朝矣貶前鄉貢進士楊仁贍為康州參軍馳驛發遣仁贍女弟出嫁前進士于瓌納函之朝有期周恤仁贍不易其日憲司糾論遂坐貶東觀奏記卷上
